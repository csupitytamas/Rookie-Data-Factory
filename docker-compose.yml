version: '3.8'

services:
  # 1. ADATBÁZIS
  postgres:
    image: postgres:13
    container_name: rookie-data-factory-postgres-1
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_password
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. BACKEND (FastAPI)
  backend:
    image: csupitytamas/rookie-backend:v1.3
    restart: always
    env_file: .env
    environment:
      - DB_URL=postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      - PYTHONPATH=/app/src:/app
      - AIRFLOW_URL=http://airflow-webserver:8080/api/v1
      - AIRFLOW_USERNAME=admin
      - AIRFLOW_PASSWORD=admin
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - shared_uploads:/app/src/shared_uploads

  # 3. FRONTEND (Vue.js)
  frontend:
    image: csupitytamas/rookie-frontend:v1.3
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  # 4. AIRFLOW INICIALIZÁLÓ
  airflow-init:
    image: csupitytamas/rookie-airflow:v1.3
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_URL=postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      - AIRFLOW__WEBSERVER__SECRET_KEY=rookie_secret_key_factory_2026
    command: >
      bash -c "airflow db init && 
      (airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com || true) &&
      airflow dags unpause refresh_pipeline_metadata || true &&
      airflow dags unpause status_sync_dag || true"

  # 5. AIRFLOW WEBSERVER
  airflow-webserver:
    image: csupitytamas/rookie-airflow:v1.3
    restart: always
    env_file: .env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - DB_URL=postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      - AIRFLOW__WEBSERVER__X_FRAME_OPTIONS=ALLOWALL
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=rookie_secret_key_factory_2026
      - PYTHONPATH=/opt/airflow/plugins:/opt/airflow/dags
    ports:
      - "8080:8080"
    volumes:
      - airflow_logs:/opt/airflow/logs
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./output:/opt/airflow/plugins/out/output
      - shared_uploads:/opt/airflow/plugins/shared_uploads
    command: webserver

  # 6. AIRFLOW SCHEDULER
  airflow-scheduler:
    image: csupitytamas/rookie-airflow:v1.3
    restart: always
    env_file: .env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - DB_URL=postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=rookie_secret_key_factory_2026
      - PYTHONPATH=/opt/airflow/plugins:/opt/airflow/dags
    volumes:
      - airflow_logs:/opt/airflow/logs
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./output:/opt/airflow/plugins/out/output
      - shared_uploads:/opt/airflow/plugins/shared_uploads
    command: scheduler

volumes:
  postgres_data:
  airflow_logs:
  shared_uploads: