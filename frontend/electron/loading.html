<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1e1e1e; color: white; display: flex; flex-direction: column;
               align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .spinner { border: 4px solid #333; border-top: 4px solid #3498db; border-radius: 50%;
                   width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2>Rookie Data Factory indulása...</h2>
    <p>Az első indítás pár percet igénybe vehet (Docker build).</p>
</body>
</html>
